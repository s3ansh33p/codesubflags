{% extends "admin/challenges/update.html" %}

{% block value %}
	<div class="form-group">
		<label for="value">
			Value<br>
			<small class="form-text text-muted">
				This is how many points teams will receive once they solve this challenge.
			</small>
		</label>
		<input type="number" class="form-control chal-value" name="value" value="{{ challenge.value }}" required>
	</div>
	<div class="form-group">
			<label>
					Max runtime (ms):<br>
					<small class="form-text text-muted">
							Enter the maximum runtime a submission is allowed to take.<br>
					</small>
			</label>
			<input type="number" class="form-control" name="run_timeout" placeholder="Enter max runtime in ms" value="{{ challenge.run_timeout }}" required>
	</div>

	<div class="form-group">
			<label>
					Languages<br>
					<small class="form-text text-muted">
							Add one row per language the participant can pick from. Each row has its own
							template file and optional data file (both relative to the plugin's
							<code>challenge_files/</code> directory). Install missing runtimes from
							<a href="/admin/codesubflags/settings">Plugins > Code Runner</a>.
					</small>
			</label>
			<div id="codesubflag-languages"></div>
			<div class="mt-2">
					<button type="button" class="btn btn-sm btn-outline-success" id="codesubflag-add-language">
							+ Add language
					</button>
			</div>
			<input type="hidden" name="languages" id="codesubflag-languages-json">
	</div>

	<div class="form-group">
			<label>
					Run history size<br>
					<small class="form-text text-muted">
							Server-side retention of each user's code runs. Use <code>-1</code> for disabled (browser localStorage only), <code>0</code> for unlimited, or a positive number to keep only the last N runs per user.
					</small>
			</label>
			<input type="number" class="form-control" name="history_size" value="{{ challenge.history_size if challenge.history_size is not none else CODESUBFLAGS_DEFAULT_HISTORY_SIZE }}" required>
	</div>
{% endblock %}

{% block footer %}
	<!-- Adds div with title for subflag section at the bottom of the page -->
	<div id="codesubflags" name="codesubflags" >
		<h4 style="margin-top: 75px;">Subflags</h4>
	</div>

	<!-- Adds button to add a new subflag to the challenge -->
	<div id="add-subflag" style="text-align:center">
			<button class="btn btn-success" style="margin-top: 25px;" id="add-new-subflag" type="button" onclick="add_codesubflag()">
				Add new Subflag
			</button>
	</div>
{% endblock %}
